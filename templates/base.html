<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Talmocur{% endblock %}</title>
  {% block meta %}{% endblock %}

  <!-- Boostrap deshabilitado por el momento
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />
  -->

  <!-- Boxicons -->
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />

  <!-- Google Fonts: DM Sans -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap"
    rel="stylesheet" />

  <!-- CSS base -->
  <link rel="stylesheet" href="/static/css/home.css" />
  
  <!-- CSS adicional por template -->
  {% block extra_css %}{% endblock %}
</head>

<body>

  <!-- ============================================================
       NAVBAR GLOBAL
       ============================================================ -->
  <header class="barra-navegacion" id="navbar">
    <div class="barra-navegacion__interior">

      <!-- Logo -->
      <a href="/" class="barra-navegacion__logo" aria-label="Talmocur inicio">
        <img src="/static/image/logo_blanco_sin_fondo.png" alt="Talmocur" class="barra-navegacion__logo-img" />
      </a>

      <!-- Nav links -->
      <nav class="barra-navegacion__menu" aria-label="Navegación principal">
        <a href="/#beneficios" class="barra-navegacion__link {% block nav_beneficios %}{% endblock %}">Beneficios</a>
        <a href="/#quienes-somos" class="barra-navegacion__link {% block nav_quienes %}{% endblock %}">Quiénes somos</a>
        <a href="/login" class="barra-navegacion__btn-login {% block nav_login %}{% endblock %}">
          <i class='bx bx-user'></i>
          Iniciar sesión
        </a>
      </nav>

    </div>
  </header>


  <!-- ============================================================
       CONTENIDO PRINCIPAL (cada template lo define)
       ============================================================ -->
  {% block content %}{% endblock %}


  <!-- JS adicional por template -->
  {% block extra_js %}{% endblock %}

</body>

</html>
