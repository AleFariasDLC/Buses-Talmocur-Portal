<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Talmocur{% endblock %}</title>
  {% block meta %}{% endblock %}

  <!-- Boostrap deshabilitado por el momento
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />
  -->

  <!-- Boxicons -->
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />

  <!-- Google Fonts: DM Sans -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap"
    rel="stylesheet" />

  <!-- CSS base -->
  <link rel="stylesheet" href="/static/css/home.css" />
  
  <!-- CSS adicional por template -->
  {% block extra_css %}{% endblock %}
</head>

<body>

  <!-- ============================================================
       NAVBAR GLOBAL
       ============================================================ -->
  <header class="barra-navegacion" id="navbar">
    <div class="barra-navegacion__interior">

      <!-- Logo -->
      <a href="/" class="barra-navegacion__logo" aria-label="Talmocur inicio">
        <img src="/static/image/logo_blanco_sin_fondo.png" alt="Talmocur" class="barra-navegacion__logo-img" />
      </a>

      <!-- Nav links -->
      <nav class="barra-navegacion__menu" aria-label="Navegación principal">
        <a href="/#beneficios" class="barra-navegacion__link {% block nav_beneficios %}{% endblock %}">Beneficios</a>
        <a href="/quienes-somos" class="barra-navegacion__link {% block nav_quienes %}{% endblock %}">Quiénes somos</a>
        <a href="/tarifas" class="barra-navegacion__link {% block nav_tarifas %}{% endblock %}">Tarifas</a>

        {% if usuario_logueado %}
        <!-- ── Usuario logueado: dropdown ── -->
        <div class="usuario-menu" id="usuarioMenu">
          <button class="usuario-menu__btn" id="btnUsuarioMenu" aria-expanded="false" aria-haspopup="true">
            <i class='bx bx-user'></i>
            <span class="usuario-menu__nombre">{{ usuario_nombre.split(' ')[0] }}</span>
            <i class='bx bx-chevron-down usuario-menu__flecha'></i>
          </button>
          <div class="usuario-menu__dropdown" id="usuarioDropdown">
            <a href="/perfil" class="usuario-menu__opcion">
              <i class='bx bx-id-card'></i>
              Ver perfil
            </a>
            {% if usuario_rol == 'admin' %}
            <a href="/admin" class="usuario-menu__opcion">
              <i class='bx bx-shield-quarter'></i>
              Panel Admin
            </a>
            {% endif %}
            <button class="usuario-menu__opcion usuario-menu__opcion--logout" id="btnCerrarSesion">
              <i class='bx bx-log-out'></i>
              Cerrar sesión
            </button>
          </div>

        </div>
        {% else %}
        <!-- ── No logueado: botón login ── -->
        <a href="/login" class="barra-navegacion__btn-login {% block nav_login %}{% endblock %}">
          <i class='bx bx-user'></i>
          Iniciar sesión
        </a>
        {% endif %}

      </nav>

    </div>
  </header>


  <!-- ============================================================
       CONTENIDO PRINCIPAL (cada template lo define)
       ============================================================ -->
  {% block content %}{% endblock %}


  <!-- JS global del navbar -->
  <script src="/static/js/navbar.js"></script>

  <!-- JS adicional por template -->
  {% block extra_js %}{% endblock %}

</body>

</html>
